# Parking slots for parkinglot world (map frame). Each slot: 가로/X depth 0.50m, 세로/Y 0.45m,
# flush to right wall (back X=0.45), 4 slots from top (Y=1.97). Entry opens toward -X.
# parked pose = nose-in facing the wall (+X), yaw 0.0 rad.
parking_spaces:
